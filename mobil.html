<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <meta name="theme-color" content="#b91c1c">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seydişehir İtfaiye - Mobil Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://api-maps.yandex.ru/2.1/?lang=tr_TR" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #f1f5f9; margin: 0; padding: 0; }
        #map { height: 320px; width: 100%; border-bottom: 4px solid #b91c1c; position: sticky; top: 0; z-index: 1000; }
        .h-card { background: white; border-radius: 15px; padding: 15px; margin: 10px; border-left: 6px solid; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .aktif { border-left-color: #198754; }
        .arizali { border-left-color: #dc3545; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="container pb-5">
        <h5 class="mt-3 text-center text-danger fw-bold">📍HİDRANTLAR CANLI KONUM</h5>
        <div id="liste-icerik"></div>
    </div>

    <!-- Durum Güncelleme Modalı -->
    <div class="modal fade" id="durumModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white"><h5 class="modal-title">Hidrant Durum Bildir</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="seciliHidrantId">
                    <select class="form-select mb-3" id="yeniDurum">
                        <option value="aktif">✅ Çalışıyor</option>
                        <option value="basinç_düşük">⚠️ Su Basıncı Düşük</option>
                        <option value="su_yok">❌ Su Yok</option>
                        <option value="arızalı">🔧 Fiziksel Hasar</option>
                    </select>
                    <button class="btn btn-danger w-100" onclick="durumGuncelle()">GÜNCELLE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBW7ZKG_Tl_RQNBYqObQLNWaikklaZver4",
            authDomain: "seydisehir-hidrant-takip.firebaseapp.com",
            projectId: "seydisehir-hidrant-takip",
            storageBucket: "seydisehir-hidrant-takip.firebasestorage.app",
            messagingSenderId: "796886633761",
            appId: "1:796886633761:web:bff9d85151021c2ff84260"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        var myMap, userCoords = null;

        ymaps.ready(() => {
            myMap = new ymaps.Map("map", { center: [37.4182, 31.8465], zoom: 15 });
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    userCoords = [pos.coords.latitude, pos.coords.longitude];
                    verileriGetir();
                });
            }
            verileriGetir();
        });

        function modalAc(id) {
            document.getElementById('seciliHidrantId').value = id;
            new bootstrap.Modal(document.getElementById('durumModal')).show();
        }

        function durumGuncelle() {
            const id = document.getElementById('seciliHidrantId').value;
            const durum = document.getElementById('yeniDurum').value;
            db.collection("hidrantlar").doc(id).update({ st: durum }).then(() => {
                location.reload();
            });
        }

        function verileriGetir() {
            db.collection("hidrantlar").onSnapshot(snapshot => {
                const icerik = document.getElementById('liste-icerik');
                icerik.innerHTML = "";
                myMap.geoObjects.removeAll();

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const hId = doc.id;
                    
                    // İkon Seçimi
                    let icon = 'islands#greenWaterDropIcon';
                    if (data.st === 'su_yok') icon = 'islands#redStretchyIcon'; // Yanıp sönen efektli kırmızı
                    else if (data.st === 'arızalı' || data.st === 'basinç_düşük') icon = 'islands#yellowWaterDropIcon';

                    let placemark = new ymaps.Placemark([parseFloat(data.lat), parseFloat(data.lng)], {
                        balloonContent: `<b>${data.ad}</b><br>Durum: ${data.st}`
                    }, { preset: icon });
                    myMap.geoObjects.add(placemark);

                    icerik.innerHTML += `
                    <div class="h-card ${data.st=='aktif'?'aktif':'arizali'}">
                        <div class="d-flex justify-content-between"><strong>${data.ad.toUpperCase()}</strong>
                            <span class="badge ${data.st=='aktif'?'bg-success':'bg-danger'}">${data.st.toUpperCase()}</span>
                        </div>
                        <button class="btn btn-outline-danger btn-sm w-100 mt-2" onclick="modalAc('${hId}')">⚠️ DURUM BİLDİR</button>
                    </div>`;
                });
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
