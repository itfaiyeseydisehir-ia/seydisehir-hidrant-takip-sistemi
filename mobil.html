<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <!-- Mobil cihazlar için ekran ölçekleme ayarı -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İtfaiye Mobil Hidrant</title>
    
    <!-- Android ve iOS için uygulama simgesi ayarları -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://api-maps.yandex.ru/2.1/?lang=tr_TR" type="text/javascript"></script>

    <style>
        :root { --itfaiye-kirmizi: #b91c1c; }
        body { background-color: #f0f2f5; font-size: 16px; } /* Mobilde okunabilirlik için 16px */
        
        .navbar { background-color: var(--itfaiye-kirmizi); sticky: top; z-index: 1000; }
        
        /* Mobil Harita: Ekranın yarısını kaplar, parmakla kaydırmaya uygun */
        #map { 
            height: 40vh; 
            width: 100%; 
            border-bottom: 3px solid #ddd;
            touch-action: none; /* Harita içinde sayfa kaymasını engeller */
        }

        .container-mobile { padding: 15px; }
        
        /* Form elemanlarını büyük ve dokunulabilir yapıyoruz */
        .form-control, .form-select { height: 50px; margin-bottom: 10px; font-size: 16px; }
        
        /* Alt kısımdaki kart tasarımı */
        .hidrant-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-action { height: 50px; font-weight: bold; border-radius: 10px; }
        .badge-status { font-size: 0.9rem; padding: 8px 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid justify-content-center">
        <span class="navbar-brand mb-0 h1">🚒 MOBİL HİDRANT TAKİP</span>
    </div>
</nav>

<!-- HARİTA EN ÜSTTE SABİT -->
<div id="map"></div>

<div class="container-mobile">
    <!-- FORM KARTI -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <h6 class="text-muted mb-3">📍 Haritaya Tıklayarak Konum Seçin</h6>
            <form id="hidrantForm">
                <input type="text" id="newAdres" class="form-control" placeholder="Hidrant Adresi/Mevki" required>
                <select id="newDurum" class="form-select">
                    <option value="aktif">✅ Sağlam / Aktif</option>
                    <option value="arizali">❌ Arızalı / Bakım</option>
                </select>
                <div class="row g-2">
                    <div class="col-6"><input type="text" id="newLat" class="form-control bg-light" placeholder="Enlem" readonly></div>
                    <div class="col-6"><input type="text" id="newLng" class="form-control bg-light" placeholder="Boylam" readonly></div>
                </div>
                <button type="submit" class="btn btn-danger w-100 btn-action mt-2 shadow">KAYDET</button>
            </form>
        </div>
    </div>

    <!-- LİSTE (KART GÖRÜNÜMÜ) -->
    <h6 class="mb-3">Kayıtlı Hidrantlar</h6>
    <div id="mobilListe"></div>
</div>

<script>
    var myMap, tempMarker;
    let hidrantlar = JSON.parse(localStorage.getItem('itfaiyeVerileri')) || [];

    ymaps.ready(function () {
        myMap = new ymaps.Map("map", {
            center: [37.4182, 31.8465],
            zoom: 14,
            controls: ['zoomControl'] // Mobilde kalabalık yapmasın diye sadece zoom kalsın
        });

        myMap.events.add('click', function (e) {
            var coords = e.get('coords');
            document.getElementById('newLat').value = coords[0].toFixed(6);
            document.getElementById('newLng').value = coords[1].toFixed(6);

            if (tempMarker) {
                tempMarker.geometry.setCoordinates(coords);
            } else {
                tempMarker = new ymaps.Placemark(coords, {}, { preset: 'islands#yellowCircleDotIcon' });
                myMap.geoObjects.add(tempMarker);
            }
        });
        arayuzuGuncelle();
    });

    function arayuzuGuncelle() {
        const liste = document.getElementById('mobilListe');
        liste.innerHTML = "";
        if (myMap) myMap.geoObjects.removeAll();
        if (tempMarker) myMap.geoObjects.add(tempMarker);

        hidrantlar.forEach((h, index) => {
            let naviLink = `https://yandex.com/maps/?pt=${h.lng},${h.lat}&z=18&l=map`;
            
            let html = `
            <div class="hidrant-card">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <strong class="d-block">${h.adres}</strong>
                        <small class="text-muted">${h.lat}, ${h.lng}</small>
                    </div>
                    <span class="badge badge-status ${h.durum === 'aktif' ? 'bg-success' : 'bg-danger'}">${h.durum.toUpperCase()}</span>
                </div>
                <div class="d-flex gap-2">
                    <a href="${naviLink}" target="_blank" class="btn btn-warning flex-grow-1 btn-sm fw-bold">YANDEX NAVİ</a>
                    <button onclick="kayitSil(${index})" class="btn btn-outline-secondary btn-sm">SİL</button>
                </div>
            </div>`;
            liste.innerHTML += html;

            let ikon = h.durum === 'aktif' ? 'islands#blueWaterDropIcon' : 'islands#redWaterDropIcon';
            myMap.geoObjects.add(new ymaps.Placemark([h.lat, h.lng], { balloonContent: h.adres }, { preset: ikon }));
        });
    }

    document.getElementById('hidrantForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const yeni = {
            adres: document.getElementById('newAdres').value,
            durum: document.getElementById('newDurum').value,
            lat: document.getElementById('newLat').value,
            lng: document.getElementById('newLng').value
        };
        hidrantlar.push(yeni);
        localStorage.setItem('itfaiyeVerileri', JSON.stringify(hidrantlar));
        this.reset();
        if (tempMarker) { myMap.geoObjects.remove(tempMarker); tempMarker = null; }
        arayuzuGuncelle();
    });

    function kayitSil(index) {
        if(confirm("Silinsin mi?")) {
            hidrantlar.splice(index, 1);
            localStorage.setItem('itfaiyeVerileri', JSON.stringify(hidrantlar));
            arayuzuGuncelle();
        }
    }
</script>
</body>
</html>
