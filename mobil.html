<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İtfaiye Mobil Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://api-maps.yandex.ru/2.1/?lang=tr_TR" type="text/javascript"></script>
    <style>
        body { background: #f8f9fa; }
        #map { height: 45vh; width: 100%; border-bottom: 4px solid #b91c1c; position: sticky; top: 0; z-index: 1000; }
        .h-card { background: white; border-radius: 15px; padding: 15px; margin: 15px 10px; border-left: 6px solid; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .aktif { border-left-color: #198754; }
        .arizali { border-left-color: #dc3545; }
        .btn-navi { background: #ffc107; color: black; font-weight: bold; width: 100%; border-radius: 10px; margin-top: 10px; text-decoration: none; display: block; text-align: center; padding: 12px; font-size: 1.1rem; }
        .refresh-btn { position: fixed; bottom: 20px; right: 20px; z-index: 2000; border-radius: 50%; width: 60px; height: 60px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="container pb-5" id="h-liste">
        <h5 class="mt-4 text-center text-danger fw-bold">📍 KAYITLI HİDRANTLAR</h5>
        <div id="liste-icerik"></div>
    </div>
    
    <button onclick="location.reload()" class="btn btn-danger refresh-btn">🔄</button>

    <script>
        var myMap;
        let veriler = JSON.parse(localStorage.getItem('itfaiye_db')) || [];

        ymaps.ready(() => {
            myMap = new ymaps.Map("map", { 
                center: [37.4182, 31.8465], 
                zoom: 15, 
                controls: ['zoomControl', 'geolocationControl'] 
            });
            listele();
        });

        function listele() {
            const icerik = document.getElementById('liste-icerik');
            icerik.innerHTML = "";
            
            if(veriler.length === 0) {
                icerik.innerHTML = '<p class="text-center text-muted mt-4">Henüz kayıtlı hidrant bulunamadı. Lütfen masaüstü sürümünden ekleme yapın.</p>';
            }

            veriler.forEach((h, i) => {
                icerik.innerHTML += `
                    <div class="h-card ${h.st=='aktif'?'aktif':'arizali'}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="fw-bold mb-1">${h.ad.toUpperCase()}</h6>
                                <small class="text-muted d-block mb-2">Koordinat: ${h.lat}, ${h.lng}</small>
                            </div>
                            <span class="badge ${h.st=='aktif'?'bg-success':'bg-danger'}">${h.st.toUpperCase()}</span>
                        </div>
                        <a href="yandexnavi://build_route_on_map?lat_to=${h.lat}&lon_to=${h.lng}" class="btn-navi">🚩 NAVİGASYONU AÇ (YANDEX)</a>
                    </div>`;
                
                myMap.geoObjects.add(new ymaps.Placemark([h.lat, h.lng], {
                    balloonContent: h.ad
                }, {
                    preset: h.st=='aktif'?'islands#blueWaterDropIcon':'islands#redWaterDropIcon'
                }));
            });
        }
    </script>
</body>
</html>
