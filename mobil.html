<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seydişehir İtfaiye - Mobil Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://api-maps.yandex.ru/2.1/?lang=tr_TR" type="text/javascript"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #f1f5f9; margin: 0; padding: 0; }
        #map { height: 50vh; width: 100%; border-bottom: 4px solid #b91c1c; position: sticky; top: 0; z-index: 1000; }
        .h-card { background: white; border-radius: 15px; padding: 15px; margin: 10px; border-left: 6px solid; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .aktif { border-left-color: #198754; }
        .arizali { border-left-color: #dc3545; }
        .btn-navi { background: #ffc107; color: black; font-weight: bold; width: 100%; border-radius: 10px; margin-top: 10px; padding: 12px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="container pb-5">
        <h5 class="mt-3 text-center text-danger fw-bold">📍 CANLI HİDRANT HARİTASI</h5>
        <div id="liste-icerik"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBW7ZKG_Tl_RQNBYqObQLNWaikklaZver4",
            authDomain: "seydisehir-hidrant-takip.firebaseapp.com",
            projectId: "seydisehir-hidrant-takip",
            storageBucket: "seydisehir-hidrant-takip.firebasestorage.app",
            messagingSenderId: "796886633761",
            appId: "1:796886633761:web:bff9d85151021c2ff84260"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        var myMap;
        ymaps.ready(() => {
    myMap = new ymaps.Map("map", { 
        center: [37.4182, 31.8465], 
        zoom: 15, 
        controls: ['zoomControl'] // 'geolocationControl'u buradan sildik
    });

    // Kendi Konum Butonumuzu Kendimiz Yapalım (Ücretsiz ve Anahtarsız)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const myCoords = [pos.coords.latitude, pos.coords.longitude];
            myMap.setCenter(myCoords, 17);
            
            // Personelin olduğu yere mavi bir halka koy
            const userMarker = new ymaps.Placemark(myCoords, {}, {
                preset: 'islands#geolocationIcon'
            });
            myMap.geoObjects.add(userMarker);
        });
    }

    verileriGetir();
});

        function verileriGetir() {
            db.collection("hidrantlar").orderBy("tarih", "desc").onSnapshot(snapshot => {
                const icerik = document.getElementById('liste-icerik');
                icerik.innerHTML = "";
                
                // Sadece hidrantları temizle, personelin kendi konumunu silme
                myMap.geoObjects.each(function (obj) {
                    if (obj.properties.get('id') === 'hidrant') myMap.geoObjects.remove(obj);
                });

                snapshot.forEach(doc => {
                    const h = doc.data();
                    icerik.innerHTML += `
    <div class="h-card ${h.st=='aktif'?'aktif':'arizali'}">
        <div class="d-flex justify-content-between align-items-center">
            <strong style="font-size:1.1rem;">${h.ad.toUpperCase()}</strong>
            <span class="badge ${h.st=='aktif'?'bg-success':'bg-danger'}">${h.st.toUpperCase()}</span>
        </div>
        <div class="mt-1 text-secondary">Tip: ${h.tip}</div>
        
        <div class="row g-2 mt-2">
            <div class="col-6">
                <a href="yandexnavi://build_route_on_map?lat_to=${h.lat}&lon_to=${h.lng}" class="btn-navi" style="background:#ffc107; color:black; display:block; text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold;">YANDEX</a>
            </div>
            <div class="col-6">
                <a href="https://maps.apple.com/?daddr=${h.lat},${h.lng}" class="btn-navi" style="background:#007aff; color:white; display:block; text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold;">APPLE (iOS)</a>
            </div>
        </div>
        <div class="mt-2 text-center">
             <a href="https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}" target="_blank" class="text-decoration-none small text-muted">Google Haritalar ile Aç</a>
        </div>
    </div>`;
                    
                    let icon = h.tip === 'Yer Üstü' ? 'islands#redWaterDropIcon' : 'islands#blueWaterDropIcon';
                    let placemark = new ymaps.Placemark([h.lat, h.lng], {
                        balloonContent: h.ad
                    }, {
                        preset: icon
                    });
                    placemark.properties.set('id', 'hidrant');
                    myMap.geoObjects.add(placemark);
                });
            });
        }
    </script>
</body>
</html>
